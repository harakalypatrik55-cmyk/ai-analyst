<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --neon-c: #00f2ff; --neon-p: #bc13fe; --bg: #02050a; }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 110px;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        /* DATE SCROLLER - Tvoj štýl z fotky 21188 */
        .date-box { display: flex; gap: 10px; padding: 15px; overflow-x: auto; border-bottom: 1px solid #1a1e26; }
        .date-btn { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 15px; padding: 10px 18px; text-align: center; min-width: 60px; font-size: 11px; }
        .date-btn.active { border: 2px solid var(--neon-c); box-shadow: 0 0 10px var(--neon-c); }

        /* MATCH CARD - Tvoj štýl z fotky 21188 */
        .match-card { 
            background: rgba(188, 19, 254, 0.03); border: 1px solid rgba(188, 19, 254, 0.15); 
            border-radius: 20px; margin: 10px 15px; padding: 18px; display: flex; justify-content: space-between; align-items: center;
        }
        .team-row { display: flex; align-items: center; margin: 4px 0; font-weight: 500; }
        .logo { width: 22px; height: 22px; margin-right: 12px; }
        .time-badge { background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-c); border-radius: 12px; padding: 6px 14px; color: var(--neon-c); font-weight: bold; font-size: 14px; }

        /* TIKET / TIP - Štýl z fotky 21184 a 21182 */
        .premium-box { border: 2px solid var(--neon-p); border-radius: 25px; margin: 15px; padding: 25px; background: rgba(188, 19, 254, 0.05); }
        .tip-badge { background: var(--neon-c); color: black; border-radius: 10px; padding: 4px 12px; font-weight: bold; float: right; }

        /* NAVIGÁCIA - Presne podľa fotky 21188 */
        .nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: #010307; display: flex; border-top: 1px solid #1a1e26; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 10px; padding-top: 15px; cursor: pointer; }
        .nav-item.active { color: var(--neon-c); }
        .nav-icon { display: block; font-size: 26px; margin-bottom: 4px; filter: grayscale(1); }
        .nav-item.active .nav-icon { filter: grayscale(0) drop-shadow(0 0 8px var(--neon-c)); }
    </style>
</head>
<body>
    <div id="v-matches" class="view active">
        <div class="date-box">
            <div class="date-btn active">Dnes<br><b>22.3.</b></div>
            <div class="date-btn">Zajtra<br><b>23.3.</b></div>
            <div class="date-btn">Deň<br><b>24.3.</b></div>
        </div>
        <div id="matches-list">
            </div>
    </div>

    <div class="nav">
        <div class="nav-item active">
            <span class="nav-icon">🏟️</span>ZÁPASY
        </div>
        <div class="nav-item">
            <span class="nav-icon">🎫</span>TIKET
        </div>
        <div class="nav-item">
            <span class="nav-icon">💡</span>TIPY
        </div>
        <div class="nav-item">
            <span class="nav-icon">📊</span>ŠTATISTIKA
        </div>
    </div>
</body>
</html>
