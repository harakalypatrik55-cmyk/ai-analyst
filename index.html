<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Betting AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-b: #00f2ff; --neon-p: #ff00ff; --bg: #05000f; --card-bg: rgba(20, 0, 40, 0.7); }
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 100px;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        /* Horná lišta */
        .date-bar { display: flex; overflow-x: auto; padding: 15px 10px; gap: 10px; sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid rgba(0, 242, 255, 0.1); scrollbar-width: none; }
        .date-item { min-width: 80px; padding: 10px; text-align: center; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .date-item.active { border-color: var(--neon-b); box-shadow: 0 0 10px var(--neon-b); background: rgba(0, 242, 255, 0.1); }
        /* Zápasy */
        .container { padding: 0 15px; }
        .liga-title { color: var(--neon-p); font-size: 11px; font-weight: bold; margin: 20px 0 10px 5px; text-transform: uppercase; }
        .match-card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .team-row { display: flex; align-items: center; margin: 4px 0; font-size: 14px; }
        .logo-s { width: 20px; height: 20px; margin-right: 10px; }
        .score-box { border: 1px solid var(--neon-b); border-radius: 10px; min-width: 60px; padding: 8px; text-align: center; }
        /* Modálne okno pre štatistiky */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; padding-top: 50px; }
        .modal-content { background: var(--card-bg); margin: auto; padding: 20px; border: 1px solid var(--neon-b); width: 85%; border-radius: 20px; text-align: center; }
        /* Navigácia */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(5,0,15,0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(0,242,255,0.2); }
        .nav-item { text-align: center; color: #555; font-size: 10px; cursor: pointer; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        .nav-item.active { color: var(--neon-b); }
    </style>
</head>
<body>

    <div id="date-nav" class="date-bar"></div>
    <div id="main-content" class="container"></div>

    <div id="statModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content">
            <h3 id="m-teams" style="color:var(--neon-b)"></h3>
            <hr style="opacity:0.1">
            <p>Pravdepodobnosť výhry (AI):</p>
            <h2 id="m-perc" style="color:var(--neon-p)">-- %</h2>
            <div style="display:flex; justify-content: space-around; font-size: 12px; margin-top:20px;">
                <div>Útok: <br> <b style="color:var(--neon-b)">85%</b></div>
                <div>Obrana: <br> <b style="color:var(--neon-b)">70%</b></div>
                <div>Forma: <br> <b style="color:var(--neon-b)">Dobrá</b></div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showSection('matches')"><i class="fa-solid fa-futbal"></i>ZÁPASY</div>
        <div class="nav-item" onclick="showSection('ticket')"><i class="fa-solid fa-ticket"></i>TIKET</div>
        <div class="nav-item" onclick="showSection('tips')"><i class="fa-solid fa-lightbulb"></i>TIPY</div>
        <div class="nav-item" onclick="showSection('stats')"><i class="fa-solid fa-chart-line"></i>STATS</div>
    </nav>

o": "https://media.api-sports.io/football/teams/731.png", "score": "1 : 0", "status": "FT"}], "Ligue 1": [{"home": "Lyon", "away": "Monaco", "h_logo": "https://media.api-sports.io/football/teams/80.png", "a_logo": "https://media.api-sports.io/football/teams/91.png", "score": "1 : 2", "status": "FT"}, {"home": "Marseille", "away": "Lille", "h_logo": "https://media.api-sports.io/football/teams/81.png", "a_logo": "https://media.api-sports.io/football/teams/79.png", "score": "1 : 2", "status": "FT"}, {"home": "Paris FC", "away": "Le Havre", "h_logo": "https://media.api-sports.io/football/teams/114.png", "a_logo": "https://media.api-sports.io/football/teams/111.png", "score": "3 : 2", "status": "FT"}, {"home": "Rennes", "away": "Metz", "h_logo": "https://media.api-sports.io/football/teams/94.png", "a_logo": "https://media.api-sports.io/football/teams/112.png", "score": "0 : 0", "status": "FT"}, {"home": "Nantes", "away": "Strasbourg", "h_logo": "https://media.api-sports.io/football/teams/83.png", "a_logo": "https://media.api-sports.io/football/teams/95.png", "score": "2 : 3", "status": "FT"}], "Serie B": [{"home": "Bari", "away": "Carrarese", "h_logo": "https://media.api-sports.io/football/teams/508.png", "a_logo": "https://media.api-sports.io/football/teams/1581.png", "score": "0 : 3", "status": "FT"}, {"home": "Sudtirol", "away": "Frosinone", "h_logo": "https://media.api-sports.io/football/teams/1578.png", "a_logo": "https://media.api-sports.io/football/teams/512.png", "score": "1 : 3", "status": "FT"}, {"home": "Empoli", "away": "Pescara", "h_logo": "https://media.api-sports.io/football/teams/511.png", "a_logo": "https://media.api-sports.io/football/teams/525.png", "score": "4 : 2", "status": "FT"}, {"home": "Sampdoria", "away": "Avellino", "h_logo": "https://media.api-sports.io/football/teams/498.png", "a_logo": "https://media.api-sports.io/football/teams/528.png", "score": "2 : 1", "status": "FT"}, {"home": "Virtus Entella", "away": "Reggiana", "h_logo": "https://media.api-sports.io/football/teams/527.png", "a_logo": "https://media.api-sports.io/football/teams/880.png", "score": "3 : 0", "status": "FT"}], "Bundesliga": [{"home": "FSV Mainz 05", "away": "Eintracht Frankfurt", "h_logo": "https://media.api-sports.io/football/teams/164.png", "a_logo": "https://media.api-sports.io/football/teams/169.png", "score": "2 : 1", "status": "FT"}, {"home": "FC St. Pauli", "away": "SC Freiburg", "h_logo": "https://media.api-sports.io/football/teams/186.png", "a_logo": "https://media.api-sports.io/football/teams/160.png", "score": "1 : 2", "status": "FT"}, {"home": "FC Augsburg", "away": "VfB Stuttgart", "h_logo": "https://media.api-sports.io/football/teams/170.png", "a_logo": "https://media.api-sports.io/football/teams/172.png", "score": "2 : 5", "status": "FT"}]}, "2026-03-23": {"Segunda Divisi\u00f3n": [{"home": "Castell\u00f3n", "away": "Cultural Leonesa", "h_logo": "https://media.api-sports.io/football/teams/5254.png", "a_logo": "https://media.api-sports.io/football/teams/725.png", "score": "19:30", "status": "NS"}]}, "2026-03-24": {}, "2026-03-25": {}, "2026-03-26": {}}; 
        let selectedDate = "2026-03-22";

        function showStats(home, away) {
            document.getElementById('m-teams').innerText = home + " vs " + away;
            document.getElementById('m-perc').innerText = Math.floor(Math.random() * (85 - 55 + 1) + 55) + "%"; // Simulácia AI šance
            document.getElementById('statModal').style.display = 'block';
        }

        function showSection(section) {
            const content = document.getElementById('main-content');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(section === 'matches') { render(); }
            else { content.innerHTML = `<div style="text-align:center; padding-top:100px; opacity:0.5;">Sekcia ${section.toUpperCase()} bude čoskoro dostupná.</div>`; }
        }

        function render() {
            const nav = document.getElementById('date-nav');
            const list = document.getElementById('main-content');
            if(!db || !nav || !list) return;

            const dates = Object.keys(db).sort();
            nav.innerHTML = "";
            dates.forEach(d => {
                const dt = new Date(d);
                const item = document.createElement('div');
                item.className = `date-item ${d === selectedDate ? 'active' : ''}`;
                item.onclick = () => { selectedDate = d; render(); };
                item.innerHTML = `<span>${dt.toLocaleDateString('sk-SK', {weekday: 'short'})}</span><b>${dt.getDate()}.${dt.getMonth()+1}.</b>`;
                nav.appendChild(item);
            });

            list.innerHTML = "";
            const matches = db[selectedDate];
            for(const liga in matches) {
                let html = `<div class="liga-title">${liga}</div>`;
                matches[liga].forEach(m => {
                    html += `<div class="match-card" onclick="showStats('${m.home}', '${m.away}')">
                        <div>
                            <div class="team-row"><img src="${m.h_logo}" class="logo-s">${m.home}</div>
                            <div class="team-row"><img src="${m.a_logo}" class="logo-s">${m.away}</div>
                        </div>
                        <div class="score-box">
                            <div style="color:var(--neon-b); font-weight:bold;">${m.score}</div>
                            <span style="font-size:9px; opacity:0.5;">${m.status}</span>
                        </div>
                    </div>`;
                });
                list.innerHTML += html;
            }
        }
        window.onload = render;
    </script>
</body>
</html>
