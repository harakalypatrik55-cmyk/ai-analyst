<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Betting AI</title>
    <style>
        :root { 
            --neon-b: #00f2ff; 
            --neon-p: #ff00ff; 
            --bg: #05000f; 
            --card-bg: rgba(20, 0, 40, 0.7); 
        }
        
        body { 
            background: var(--bg); 
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding-bottom: 100px; 
        }

        /* Horná lišta s dňami */
        .date-bar { 
            display: flex; 
            overflow-x: auto; 
            padding: 15px 10px; 
            gap: 10px; 
            scrollbar-width: none;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }
        .date-item { 
            min-width: 85px; 
            padding: 12px 5px; 
            text-align: center; 
            border-radius: 12px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }
        .date-item.active { 
            background: rgba(0, 242, 255, 0.1); 
            border-color: var(--neon-b); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .date-item span { display: block; font-size: 10px; text-transform: uppercase; opacity: 0.6; }
        .date-item b { font-size: 14px; color: var(--neon-b); }

        /* Karty zápasov */
        .container { padding: 0 15px; }
        .liga-title { 
            color: var(--neon-p); 
            font-size: 11px; 
            font-weight: bold; 
            margin: 20px 0 10px 5px; 
            text-transform: uppercase;
        }
        .match-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 18px; 
            padding: 15px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .team-row { display: flex; align-items: center; margin: 4px 0; font-size: 15px; }
        .logo-s { width: 22px; height: 22px; margin-right: 12px; object-fit: contain; background: white; border-radius: 50%; padding: 1px; }
        
        .score-box { 
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--neon-b);
            border-radius: 12px;
            min-width: 65px;
            padding: 10px 5px;
            text-align: center;
        }
        .score-val { color: var(--neon-b); font-weight: bold; font-size: 16px; }

        /* Spodná navigácia */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: rgba(5, 0, 15, 0.95); 
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
        }
        .nav-item { text-align: center; color: #555; font-size: 10px; }
        .nav-item.active { color: var(--neon-b); }
    </style>
</head>
<body>

    <div id="date-nav" class="date-bar"></div>
    <div class="container" id="list"></div>

    <nav class="nav-bar">
        <div class="nav-item active">ZÁPASY</div>
        <div class="nav-item">TIKET</div>
        <div class="nav-item">TIPY</div>
        <div class="nav-item">STATS</div>
    </nav>

    <script>
        // Tieto dva riadky musí Python prepísať - NEMEŇ ICH RUČNE!
        const db = REPLACE_DB; 
        let selectedDate = "REPLACE_DATE";

        function render() {
            const nav = document.getElementById('date-nav');
            const list = document.getElementById('list');
            if(!db || !nav || !list) return;

            const dates = Object.keys(db).sort();
            nav.innerHTML = "";
            dates.forEach(d => {
                const dt = new Date(d);
                const dName = dt.toLocaleDateString('sk-SK', {weekday: 'short'});
                const dNum = dt.getDate() + "." + (dt.getMonth() + 1) + ".";
                const item = document.createElement('div');
                item.className = `date-item ${d === selectedDate ? 'active' : ''}`;
                item.onclick = () => { selectedDate = d; render(); };
                item.innerHTML = `<span>${dName}</span><b>${dNum}</b>`;
                nav.appendChild(item);
            });

            list.innerHTML = "";
            const matchesForDay = db[selectedDate];
            if(!matchesForDay) return;

            for(const liga in matchesForDay) {
                let html = `<div class="liga-title">${liga}</div>`;
                matchesForDay[liga].forEach(m => {
                    html += `
                    <div class="match-card">
                        <div>
                            <div class="team-row"><img src="${m.h_logo}" class="logo-s">${m.home}</div>
                            <div class="team-row"><img src="${m.a_logo}" class="logo-s">${m.away}</div>
                        </div>
                        <div class="score-box">
                            <div class="score-val">${m.score}</div>
                            <span style="font-size:9px; opacity:0.5; display:block;">${m.status}</span>
                        </div>
                    </div>`;
                });
                list.innerHTML += html;
            }
        }
        window.onload = render;
    </script>
</body>
</html>
