<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neural Betting AI</title>
    <style>
        :root { 
            --neon-b: #00f2ff; 
            --neon-p: #ff00ff; 
            --bg: #05000f; 
            --card-bg: rgba(20, 0, 40, 0.7); 
        }
        
        body { 
            background: var(--bg); 
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding-bottom: 100px; 
        }

        .date-bar { 
            display: flex; 
            overflow-x: auto; 
            padding: 15px 10px; 
            gap: 10px; 
            scrollbar-width: none;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
        }
        .date-item { 
            min-width: 85px; 
            padding: 12px 5px; 
            text-align: center; 
            border-radius: 12px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .date-item.active { 
            background: rgba(0, 242, 255, 0.15); 
            border-color: var(--neon-b); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }
        .date-item span { display: block; font-size: 10px; text-transform: uppercase; opacity: 0.6; }
        .date-item b { font-size: 14px; color: var(--neon-b); }

        .container { padding: 0 15px; }
        .liga-title { 
            color: var(--neon-p); 
            font-size: 11px; 
            font-weight: bold; 
            margin: 25px 0 10px 5px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .match-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 18px; 
            padding: 15px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .team-row { display: flex; align-items: center; margin: 5px 0; font-size: 15px; font-weight: 500; }
        .logo-s { width: 24px; height: 24px; margin-right: 12px; object-fit: contain; }
        
        .score-box { 
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--neon-b);
            border-radius: 12px;
            min-width: 70px;
            padding: 10px 5px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
        }
        .score-val { color: var(--neon-b); font-weight: bold; font-size: 18px; font-family: monospace; }

        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: rgba(5, 0, 15, 0.98); 
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
            z-index: 1000;
        }
        .nav-item { text-align: center; color: #444; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--neon-b); text-shadow: 0 0 8px var(--neon-b); }
    </style>
</head>

        let selectedDate = "2026-03-22";

        function render() {
            const nav = document.getElementById('date-nav');
            const list = document.getElementById('list');
            if(!db || typeof db !== 'object') {
                list.innerHTML = "<div style='text-align:center;padding:50px;opacity:0.5;'>Čakám na dáta zo skenera...</div>";
                return;
            }

            const dates = Object.keys(db).sort();
            if(dates.length === 0) return;
            
            nav.innerHTML = "";
            dates.forEach(d => {
                const dt = new Date(d);
                const dName = dt.toLocaleDateString('sk-SK', {weekday: 'short'});
                const dNum = dt.getDate() + "." + (dt.getMonth() + 1) + ".";
                const item = document.createElement('div');
                item.className = `date-item ${d === selectedDate ? 'active' : ''}`;
                item.onclick = () => { selectedDate = d; render(); };
                item.innerHTML = `<span>${dName}</span><b>${dNum}</b>`;
                nav.appendChild(item);
            });

            list.innerHTML = "";
            const matchesForDay = db[selectedDate];
            if(!matchesForDay) return;

            for(const liga in matchesForDay) {
                let html = `<div class="liga-title">${liga}</div>`;
                matchesForDay[liga].forEach(m => {
                    html += `
                    <div class="match-card">
                        <div>

                        </div>

                        </div>
                    </div>`;
                });
                list.innerHTML += html;
            }
        }
        window.onload = render;
